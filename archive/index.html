<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <script src="/lock.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive - Neksha DeSilva</title>
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
    
    <style>
        /* Password Protection Overlay */
        #passwordOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        #passwordOverlay.hidden {
            display: none;
        }
        
        .password-container {
            text-align: center;
            padding: 3rem;
            max-width: 450px;
            width: 90%;
        }
        
        .password-icon {
            font-size: 3rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }
        
        .password-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .password-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        
        .password-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            background: var(--card-bg);
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        
        .password-input:focus {
            outline: none;
            border-color: var(--text-primary);
        }
        
        .password-input.error {
            border-color: #dc3545;
        }
        
        .password-btn {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            background: var(--text-primary);
            color: var(--background);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .password-btn:hover {
            opacity: 0.9;
        }
        
        .password-error {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        
        .password-error.show {
            display: block;
        }

        /* Archive Content */
        #archiveContent {
            display: none;
        }

        #archiveContent.visible {
            display: block;
        }

        .archive-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
            min-height: calc(100vh - 200px);
        }

        .archive-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .archive-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 3rem;
        }

        .archive-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .archive-item {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: border-color 0.2s ease;
        }

        .archive-item:hover {
            border-color: var(--text-primary);
        }

        .archive-item-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .archive-item-description {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .archive-item-date {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.75rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 2px solid var(--border-color);
            margin-top: 4rem;
        }

        footer p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .footer-links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <!-- Password Protection Overlay -->
    <div id="passwordOverlay">
        <div class="password-container">
            <div class="password-icon">
                <i class="bi bi-lock-fill"></i>
            </div>
            <h1 class="password-title">Private Archive</h1>
            <p class="password-subtitle">This area is password protected</p>
            
            <input type="password" id="passwordInput" class="password-input" placeholder="Enter password" autocomplete="off">
            <button onclick="checkPassword()" class="password-btn">Access Archive</button>
            <p class="password-error" id="passwordError">Incorrect password. Redirecting...</p>
        </div>
    </div>

    <!-- Archive Content (Hidden until password verified) -->
    <div id="archiveContent">
        <div class="archive-container">
            <h1 class="archive-title">Archive</h1>
            <p class="archive-subtitle">Things will be available soon.</p>

            <div class="archive-list">
                <!-- Archive items will be listed here -->
                <!-- Example item structure:
                <a href="./example-document/index.html" class="archive-item">
                    <div class="archive-item-title">Example Document</div>
                    <div class="archive-item-description">Brief description of the document</div>
                    <div class="archive-item-date">October 31, 2025</div>
                </a>
                -->
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <p>&copy; 2025 Neksha DeSilva. All rights reserved.</p>
            <div class="footer-links">
                <a href="../index.html">Home</a>
                <a href="../about.html">About</a>
            </div>
        </footer>
    </div>

    <!-- Theme Toggle Script -->
    <script>
        // Initialize theme
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <!-- Password Verification Script -->
    <script src="archive-auth.js"></script>

</body>
</html>
