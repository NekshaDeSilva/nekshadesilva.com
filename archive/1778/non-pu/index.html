<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - NonPU Instant</title>
    <meta name="description" content="Sign in to access NonPU Instant software">
    <meta name="robots" content="noindex">

    <!-- Theme-aware Favicon -->
    <link rel="icon" id="favicon" type="image/png" href="../assets/NonPU_icon.png">
    <script>
        (function() {
            var setFav = function() {
                var el = document.getElementById('favicon');
                if (!el) return;
                el.href = window.matchMedia('(prefers-color-scheme: dark)').matches
                    ? '../assets/nonpu_taskbar%20and_desktop_darkmodeuseonly.png'
                    : '../assets/NonPU_icon.png';
            };
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', setFav);
            } else { setFav(); }
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', setFav);
        })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/account.css">

    <!-- hCaptcha -->
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body>
    <!-- Loading Bar -->
    <div class="loading-bar" id="loadingBar"></div>

    <div class="auth-container">
        <!-- Pending License Notice -->
        <div class="pending-license-notice" id="pendingLicenseNotice" style="display: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            <span>License key detected: <strong id="pendingKeyDisplay">NP-XXXX-XXXX-XXXX-XXXX</strong></span>
        </div>

        <div class="auth-card animate-fadeIn">
            <!-- Header with NonPU Instant Text Logo -->
            <div class="auth-header">
                <img src="../assets/NONPU_INSTSNT.PNG" alt="NonPU Instant" class="auth-logo" id="headerLogo">
                <h1 class="auth-title">Sign in</h1>
                <p class="auth-subtitle">Single Sign-On for NonPU Instant</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage" style="display: none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <span id="errorText">Error message here</span>
            </div>

            <!-- Step 1: Email Form -->
            <form id="emailForm" class="auth-form">
                <div class="form-group">
                    <div class="input-container">
                        <input type="email" id="email" name="email" required autocomplete="email" placeholder=" ">
                        <label for="email">Email address</label>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="signup/" class="text-btn">Create account</a>
                    <button type="submit" class="primary-btn">Continue</button>
                </div>
            </form>

            <!-- Step 2: Password Form (hidden initially) -->
            <form id="passwordForm" class="auth-form" style="display: none;">
                <div class="user-chip" id="userChip">
                    <div class="user-chip-avatar" id="userChipAvatar">U</div>
                    <span id="userChipEmail">user@example.com</span>
                    <button type="button" class="user-chip-change" id="changeEmail" title="Change email">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 10l5 5 5-5z"/>
                        </svg>
                    </button>
                </div>

                <div class="form-group">
                    <div class="input-container">
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder=" ">
                        <label for="password">Password</label>
                    </div>
                </div>

                <!-- hCaptcha Verification -->
                <div class="hcaptcha-container">
                    <div id="hcaptcha-login" class="h-captcha" data-sitekey="47be45ae-5ea0-48ce-b962-84cc0da02b7e" data-theme="light" data-size="normal"></div>
                    <p class="hcaptcha-error" id="hcaptchaError" style="display: none;">Please complete the verification</p>
                </div>

                <div class="form-actions">
                    <a href="#" class="text-btn">Forgot password?</a>
                    <button type="submit" class="primary-btn">Sign in</button>
                </div>
            </form>
        </div>

        <!-- Separate page footer (outside the card) -->
        <footer class="page-footer">
            <div class="footer-links">
                <a href="/legal/license.html">License</a>
                <a href="/legal/license.html">Terms</a>
                <a href="/legal/license.html">Privacy</a>
            </div>
            <div class="footer-brand">
                <img src="../assets/brand_logo.png" alt="GVMA" class="footer-logo">
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script>
        // Load Supabase from CDN asynchronously so UI always works
        (function() {
            var s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            s.onerror = function() {
                console.warn('Supabase CDN failed to load – login UI will still work.');
            };
            document.head.appendChild(s);
        })();
    </script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {

            // ========================================================
            // STEP 1: Capture URL params IMMEDIATELY (no Supabase needed)
            // This must happen before ANY redirect so the enc/key is never lost
            // ========================================================
            var captured = NonPUAuth.captureURLParams();

            // Show pending key notice if applicable
            var pendingKey = captured.key;
            if (pendingKey) {
                document.getElementById('pendingLicenseNotice').style.display = 'flex';
                document.getElementById('pendingKeyDisplay').textContent = pendingKey;
            }

            // ========================================================
            // STEP 2: Wait for Supabase CDN, then check session
            // If already signed in → go straight to dashboard
            // ========================================================
            NonPUAuth.waitForSupabase().then(function() {
                NonPUAuth.initSupabase();
                return NonPUAuth.getSession();
            }).then(function(session) {
                if (session) {
                    // User is already signed in — skip login, go to dashboard
                    window.location.href = 'dashboard/';
                }
            }).catch(function(err) {
                // Supabase CDN didn't load — show login form anyway
                console.warn('Session check skipped:', err.message);
            });

            // ========================================================
            // STEP 3: Login form handlers
            // ========================================================
            var loadingBar = document.getElementById('loadingBar');
            var errorMessage = document.getElementById('errorMessage');
            var errorText = document.getElementById('errorText');
            var emailForm = document.getElementById('emailForm');
            var passwordForm = document.getElementById('passwordForm');
            var userChipEmail = document.getElementById('userChipEmail');
            var userChipAvatar = document.getElementById('userChipAvatar');
            var changeEmailBtn = document.getElementById('changeEmail');
            var currentEmail = '';

            function showLoading() { loadingBar.classList.add('active'); }
            function hideLoading() { loadingBar.classList.remove('active'); }
            function showError(msg) { errorText.textContent = msg; errorMessage.style.display = 'flex'; }
            function hideError() { errorMessage.style.display = 'none'; }

            emailForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideError();
                showLoading();
                currentEmail = document.getElementById('email').value;
                await new Promise(function(r) { setTimeout(r, 400); });
                hideLoading();
                userChipEmail.textContent = currentEmail;
                userChipAvatar.textContent = currentEmail.charAt(0).toUpperCase();
                emailForm.style.display = 'none';
                passwordForm.style.display = 'block';
                passwordForm.classList.add('animate-slideUp');
                document.getElementById('password').focus();
            });

            changeEmailBtn.addEventListener('click', function() {
                passwordForm.style.display = 'none';
                emailForm.style.display = 'block';
                document.getElementById('email').focus();
            });

            passwordForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideError();

                // Validate hCaptcha
                var hcaptchaError = document.getElementById('hcaptchaError');
                var captchaToken = '';
                try {
                    captchaToken = hcaptcha.getResponse();
                } catch(err) {
                    console.warn('hCaptcha not loaded yet');
                }
                if (!captchaToken) {
                    hcaptchaError.style.display = 'block';
                    return;
                }
                hcaptchaError.style.display = 'none';

                showLoading();
                var password = document.getElementById('password').value;
                try {
                    // Make sure Supabase is ready before sign-in
                    await NonPUAuth.waitForSupabase();
                    NonPUAuth.initSupabase();

                    var result = await NonPUAuth.signIn(currentEmail, password);
                    hideLoading();
                    if (result.error) { showError(result.error.message || 'Invalid email or password'); return; }
                    // Sign-in succeeded — go to dashboard
                    // The enc/key are already safely in localStorage from Step 1
                    window.location.href = 'dashboard/';
                } catch (err) {
                    hideLoading();
                    showError(err.message || 'An error occurred. Please try again.');
                }
            });
        });
    </script>
</body>
</html>
