<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents - Phillips Academy Andover</title>
    <meta name="description" content="Document archive for Phillips Academy Andover">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #000;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #000;
            font-size: 0.95rem;
        }

        .documents-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .document-item {
            border: 1px solid #000;
            padding: 1.25rem;
        }

        .document-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .document-description {
            color: #000;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .document-note {
            color: #000;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .pdf-embed {
            width: 100%;
            height: 800px;
            border: 1px solid #000;
            margin-bottom: 1rem;
            background-color: #fff;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 1rem;
            border: 1px solid #000;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
            background-color: #fff;
            color: #000;
        }

        .btn:hover {
            background-color: #000;
            color: #fff;
        }

        .back-link {
            display: inline-block;
            color: #000;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-link">Back to Home</a>

        <header>
            <h1><span style="color: #0031A7;">Phillips Academy Andover</span></h1>
            
            <p class="subtitle"></p>
        </header>

      
    </div>
</body>
</html>
