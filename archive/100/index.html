<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents - Phillips Academy Andover</title>
    <meta name="description" content="Document archive for Phillips Academy Andover">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --text-primary: #f4f1e8;
            --text-secondary: #c4c1b8;
            --text-muted: #8a8780;
            --accent-highlight: #00ff41;
            --link-color: #ff4444;
            --border-color: #2a2a2a;
            --header-bg: #0f0f0f;
        }

        [data-theme="light"] {
            --bg-primary: #f4f1e8;
            --bg-secondary: #fefcf7;
            --text-primary: #1a1a1a;
            --text-secondary: #3a3a3a;
            --text-muted: #6a6a6a;
            --accent-highlight: #0088ff;
            --link-color: #0066cc;
            --border-color: #d4d1c8;
            --header-bg: #e8e5dc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--bg-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .documents-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .document-item {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
        }

        .document-name {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .document-name i {
            color: var(--link-color);
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-download {
            background-color: var(--accent-highlight);
            color: #000;
            border-color: var(--accent-highlight);
        }

        .btn-download:hover {
            opacity: 0.85;
        }

        .btn-view {
            background-color: transparent;
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .btn-view:hover {
            border-color: var(--accent-highlight);
            color: var(--accent-highlight);
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        .theme-toggle:hover {
            border-color: var(--accent-highlight);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--link-color);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .back-link:hover {
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="bi bi-sun-fill"></i>
    </button>

    <div class="container">
        <a href="../../index.html" class="back-link">
            <i class="bi bi-arrow-left"></i> Back to Home
        </a>

        <header>
            <h1>Documents for Phillips Academy Andover</h1>
            <p class="subtitle">Neksha DeSilva - Application Documents</p>
        </header>

        <div class="documents-list">
            <!-- Document 1: DeSilva Visa Letter -->
            <div class="document-item">
                <div class="document-name">
                    <i class="bi bi-file-earmark-pdf"></i>
                    DeSilva Visa Letter.pdf
                </div>
                <div class="button-group">
                    <a href="docs/DeSilva Visa Letter.pdf" download class="btn btn-download">
                        <i class="bi bi-download"></i> Download
                    </a>
                    <a href="docs/DeSilva Visa Letter.pdf" target="_blank" class="btn btn-view">
                        <i class="bi bi-eye"></i> View in New Tab
                    </a>
                </div>
            </div>

            <!-- Document 2: Email -->
            <div class="document-item">
                <div class="document-name">
                    <i class="bi bi-file-earmark-pdf"></i>
                    email.pdf
                </div>
                <div class="button-group">
                    <a href="docs/email.pdf" download class="btn btn-download">
                        <i class="bi bi-download"></i> Download
                    </a>
                    <a href="docs/email.pdf" target="_blank" class="btn btn-view">
                        <i class="bi bi-eye"></i> View in New Tab
                    </a>
                </div>
            </div>

            <!-- Document 3: Untitled document -->
            <div class="document-item">
                <div class="document-name">
                    <i class="bi bi-file-earmark-pdf"></i>
                    Untitled document (3).pdf
                </div>
                <div class="button-group">
                    <a href="docs/Untitled document (3).pdf" download class="btn btn-download">
                        <i class="bi bi-download"></i> Download
                    </a>
                    <a href="docs/Untitled document (3).pdf" target="_blank" class="btn btn-view">
                        <i class="bi bi-eye"></i> View in New Tab
                    </a>
                </div>
            </div>

            <!-- Document 4: USACO -->
            <div class="document-item">
                <div class="document-name">
                    <i class="bi bi-file-earmark-pdf"></i>
                    USACO.pdf
                </div>
                <div class="button-group">
                    <a href="docs/USACO.pdf" download class="btn btn-download">
                        <i class="bi bi-download"></i> Download
                    </a>
                    <a href="docs/USACO.pdf" target="_blank" class="btn btn-view">
                        <i class="bi bi-eye"></i> View in New Tab
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            const icon = themeToggle.querySelector('i');
            icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        }
    </script>
</body>
</html>
