<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts - Neksha DeSilva</title>
    <meta name="description" content="Thoughts, insights, and updates from Neksha DeSilva - Research, Mathematics, and Technology">
    <meta name="keywords" content="blog, posts, mathematics, research, technology, insights">
    <meta name="author" content="Neksha DeSilva">
    
    <!-- SEO Meta Tags -->
    <meta property="og:title" content="Blog - Neksha DeSilva">
    <meta property="og:description" content="Thoughts, insights, and updates from Neksha DeSilva">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="posts-style.css">
    
    <style>
        /* Password Protection Overlay */
        #passwordOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        
        #passwordOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .password-container {
            text-align: center;
            padding: 3rem;
            max-width: 450px;
            width: 90%;
        }
        
        .password-icon {
            font-size: 4rem;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .password-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }
        
        .password-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        
        .password-input-group {
            position: relative;
            margin-bottom: 1rem;
        }
        
        .password-input {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-color);
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .password-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.1);
        }
        
        .password-input.error {
            border-color: #e74c3c;
            animation: shake 0.4s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .password-btn {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .password-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.3);
        }
        
        .password-btn:active {
            transform: translateY(0);
        }
        
        .password-error {
            color: #e74c3c;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .password-error.show {
            opacity: 1;
        }
        
        .password-hint {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--code-bg);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

    </style>
</head>
<body>

    
    <!-- GitHub-Style Header -->
    <header class="posts-header">
        <div class="posts-header-container">
            <div class="posts-header-left">
                <img src="../assets/static/favicon.png" alt="Neksha DeSilva" class="posts-logo">
                <span class="posts-divider">/</span>
                <h1 class="posts-title">Posts</h1>
            </div>
            
            <div class="posts-header-center">
                <div class="posts-search-container">
                    <i class="bi bi-search"></i>
                    <input type="text" id="postsSearchInput" placeholder="Search" aria-label="Search posts">
                </div>
            </div>
            
            <div class="posts-header-right">
                <a href="../index.html" class="posts-home-btn" title="Back to Home">Home</a>
                <button id="postsThemeToggle" class="posts-theme-btn" aria-label="Toggle theme" title="Toggle Theme">
                    <i class="bi bi-moon-fill"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Filter Section -->
    <div class="posts-filter-bar">
        <div class="posts-filter-container">
            <div class="filter-section">
                <span class="filter-label">Popular tags:</span>
                <div id="popularTags" class="popular-tags">
                    <!-- Popular tags will be dynamically added from actual posts -->
                </div>
            </div>
        </div>
    </div>

    <!-- Main Posts Container -->
    <main class="posts-container">
        <div class="posts-grid" id="postsGrid">
            <!-- Posts will be dynamically loaded here -->
            <div class="posts-loading">
                <i class="bi bi-arrow-repeat"></i>
                <p>Loading posts...</p>
            </div>
        </div>

        <!-- Empty State -->
        <div class="posts-empty" id="postsEmpty">
            <i class="bi bi-feather"></i>
            <h2>Posts Coming Soon</h2>
        
        </div>
    </main>

    <!-- Minimal Footer -->
    <footer class="posts-footer">
        <p>&copy; 2025 Neksha DeSilva. All rights reserved.</p>
        <div class="footer-links">
            <a href="../index.html">Home</a>
            <a href="../about.html">About</a>
            <a href="../legal/license.html">Legal</a>
        </div>
    </footer>

    <!-- Load favicon injector -->
    <script>
        (function() {
            const script = document.createElement('script');
            script.src = '../assets/static/favicon-inject.js';
            script.async = true;
            document.head.appendChild(script);
        })();
    </script>
    

    
    <script src="posts-script.js"></script>
</body>
</html>
